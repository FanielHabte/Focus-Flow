<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Focus Flow</title>
        <link rel="stylesheet" href="/style.css">
        <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/flow.png">
    </head>

    <body>
        <div class="app-grid">
            <!-- HEADER -->
            <div id="app-header" class="black-box" >
                <h1> Your next <br> task <br> <span class="colored-text">is ready.</span> </h1>
            </div>

            <!-- ANALYTICS -->
            <div id="app-analytics">

                <h5>QUICK VIEW</h5>

                <div id="analytics-numbers">
                    <div id="completion-percentage">
                        <h4 th:text = "${completePercentage}"></h4>
                        <p class="caption"> Week done </p>
                    </div>
                    <div id="open-tasks" >
                        <h4 th:text = "${countOfOpenTasks}"></h4>
                        <p class="caption"> Tasks open </p>
                    </div>
                </div>

                <div id="next-task-available" class="black-box" th:if = "${nextUp != null}">
                    <h5> NEXT UP </h5>
                    <h4 th:text = "${nextUp.title}"></h4>
                    <p th:text = "${nextUp.description}"></p>
                </div>

                <div id="next-task-null" class="black-box" th:if = "${nextUp == null}">
                    <h5 class="sub-headers"> NEXT UP </h5>
                    <h4> All Done For Today! </h4>
                </div>

            </div>

            <!-- TASK SECTION -->
            <div class="internal-nav-and-tasks">
                <!-- NAV -->
                <div class="internal-navigation">
                    <h5> TODAY </h5>
                    <h4> Focus List </h4>
                    <div id="filter-buttons">
                        <button class="active"> All </button>
                        <button> Today </button>
                        <button> Done </button>
                    </div>
                </div>

                <!-- ALL TASKS -->
                <div class="app-all-tasks" th:unless = "${tasks.isEmpty()}">
                    <div class="task-card" th:each = "task : ${tasks}">
                        <div class="task-header">
                            <p class="task-title" th:text = "${task.title}"></p>
                            <p th:class = "|task-status status-${task.status.className()}|"
                               th:text = "${task.status}">
                            </p>
                        </div>
                        <p class="task-description" th:text = "${task.description}"> Task description </p>
                        <p class="task-time" th:text = "${task.dueDate}"> Task time </p>
                        <div class="task-buttons-container">
                            <form th:action = "@{/tasks/{id}/complete(id=${task.taskId})}" method="POST">
                                <button type="submit" class="task-update"> Complete </button>
                            </form>
                            <form th:action = "@{/tasks/{id}/delete(id=${task.taskId})}" method="POST">
                                <button type="submit" class="task-complete"> Delete </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="app-all-tasks" th:if = "${tasks.isEmpty()}">
                    <h4> <br> No Task! </h4>
                </div>

                <!-- TODAY'S TASKS -->
                <div class="app-today-tasks" th:unless = "${todayTasks.isEmpty()}">
                    <div class="task-card" th:each = "todayTask : ${todayTasks}">
                        <div class="task-header">
                            <p class="task-title" th:text = "${todayTask.title}"></p>
                            <p th:class = "|task-status status-${todayTask.status.className()}|"
                               th:text = "${todayTask.status}">
                            </p>
                        </div>
                        <p class="task-description" th:text = "${todayTask.description}"></p>
                        <p class="task-time" th:text = "${todayTask.dueDate}"></p>
                        <div class="task-buttons-container">
                            <form th:action = "@{/tasks/{id}/complete(id=${todayTask.taskId})}" method="POST">
                                <button type="submit" class="task-update"> Complete </button>
                            </form>
                            <form th:action = "@{/tasks/{id}/delete(id=${todayTask.taskId})}" method="POST">
                                <button type="submit" class="task-complete"> Delete </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="app-today-tasks" th:if = "${todayTasks.isEmpty()}">
                    <h4> <br> No Task! </h4>
                </div>

                <!-- COMPLETED TASKS -->
                <div class="app-completed-tasks" th:unless = "${completedTasks.isEmpty()}">
                    <div class="task-card" th:each = "completedTask : ${completedTasks}">
                        <div class="task-header">
                            <p class="task-title" th:text = "${completedTask.title}"></p>
                            <p th:class = "|task-status status-${completedTask.status.className()}|"
                               th:text = "${completedTask.status}">
                            </p>
                        </div>
                        <p class="task-description" th:text = "${completedTask.description}"></p>
                        <p class="task-time" th:text = "${completedTask.dueDate}"></p>
                        <div class="task-buttons-container">
                            <form th:action = "@{/tasks/{id}/complete(id=${completedTask.taskId})}" method="POST">
                                <button type="submit" class="task-update"> Complete </button>
                            </form>
                            <form th:action = "@{/tasks/{id}/delete(id=${completedTask.taskId})}" method="POST">
                                <button type="submit" class="task-complete"> Delete </button>
                            </form>
                        </div>

                    </div>
                </div>
                <div class="app-completed-tasks" th:if = "${completedTasks.isEmpty()}">
                    <h4> <br> No Task! </h4>
                </div>

            </div>

            <!-- NEW TASK FORM -->
            <div class="new-task">
                <h5> CREATE TASK </h5>
                <form th:action = "@{/task/create}" method = "POST" th:object = "${newTaskForm}">
                    <label for="title"> Title </label>
                    <input id="title" th:field = "*{title}">

                    <label for="category"> Category </label>
                    <select id="category" th:field="*{category}">
                        <option value="STUDY"> Study </option>
                        <option value="WORK"> Work </option>
                        <option value="PERSONAL"> Personal </option>
                        <option value="OTHER"> Other </option>
                    </select>

                    <label for="description"> Description </label>
                    <input id="description" th:field = "*{description}">

                    <label for="dueDate"> Due Date </label>
                    <input id="dueDate" type="datetime-local" th:field = "*{dueDate}">

                    <input type = "submit" value = "Create Task">
                </form>
            </div>
        </div>

        <script src="/script.js"> </script>
        <footer>
            <p>&copy; 2026 Focus Flow | Developed by Fani Habte | <a href="https://www.fanielhabte.com" target="_blank">My Protfolio Website</a> </p>
        </footer>

    </body>
</html>
